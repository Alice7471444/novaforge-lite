# NovaForge Lite VMware Configuration
# Optimized for VMware Workstation/Fusion

[vmware]
# Display
fullscreen=false
vram=256
# Use VMware SVGA for better performance
displayresolution=1920x1080

# Hardware
cores=2
memory=2048
# SCSI preferred
disk_adapter=lsilogic

# Features  
# Enable all for best experience
guestType=other3xlinux-64
# Time sync
syncTime=true
# Drag and drop
dragAndDrop=true
# Copy/paste  
clipboard=true

# Display optimizations
# Use Wayland if available
# Else fall back to X11
preferredDisplayServer=auto

# Graphics settings for VMware
# Use svga (virtual GPU) for best performance
# This provides 3D acceleration in VMware
vm3dGraphics=true

# Network
# NAT by default for easiest setup
networkType=NAT

# Sound
# PulseAudio preferred
sound=true

# USB
# Auto-connect USB devices
usbAutoConnect=true

# Shared folders
# Enable for seamless file sharing
sharedFolders=true