# NovaForge Lite Configuration
# Optimized for low RAM, fast boot, VMware

[System]
hostname=novaforge-lite
default_shell=/bin/bash
locale=en_US.UTF-8

[Boot]
quiet boot
splash disabled
timeout=3
autologin=true

[DisplayManager]
autologin=true
default_session=plasma-wayland.desktop
minvt=7

[Desktop]
kde_wayland=true
kde_backend=wayland
compositor=wayland

[Performance]
# Disable unnecessary services for low RAM
kwin_background=disabled
kactivityd=disabled
konsole_autostart=disabled
baloo_indexing=disabled
printd=disabled
kcheckregister=disabled
# Reduce desktop effects
desktop_effects=false
# Limit memory cache
raster_icon_cache=true

[RAM]
# Target: < 500MB idle
# Aggressive memory optimization
filesystem_caches=low
desktop_cache=low
glyph_cache=compact

[CPU]
# Power saving mode
cpu_governor=powersave
thermal_management=true

[Startup]
# Fast boot configuration
 Plymouth disabled
 early_kdm start
 instant_login=true