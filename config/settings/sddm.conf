[Autologin]
# Auto-login forNovaForge Lite
# User sessions start automatically

# Auto-login user (change username as needed)
User=novaforge
# Session to use (plasma-wayland for best VMware performance)
Session=plasma-wayland.desktop
# Re-login automatically on session exit
Relogin=true

# LightDM fallback configuration
[LightDM]
# autologin-user=novaforge
# autologin-session=plasma-wayland