# NovaForge OS Desktop Settings

[Desktop Entry]
Type=Shell
Name=NovaShell Desktop
Comment=NovaForge Gaming Desktop Environment
Exec=startplasma-wayland
DesktopSession=plasma
DesktopSession=plasmashell
DesktopSession=nvshell
X-LightDM-Session=true

[KDE Plasma Workspace]
LauncherIcons=krabbit
IconSize=48
ToolTipIconSize=24

[User Input]
InputMethod=IBus

[Internationalization]
LayoutDefault=us
LayoutList=
LayoutVariant=

[Theme Settings]
ColorScheme=NovaForge Neo
LookAndFeel=org.kde.NovaForge.Neon
Wallpaper=default

# Auto login
[LightDM]
autologin-user=novaforge
autologin-user-timeout=0

# Wayland session
[Desktop Session]
# Wayland by default for gaming
XDG_SESSION_TYPE=wayland
XDG_SESSION_DESKTOP=plasma

# Gaming mode - GameMode
[GameMode]
ApplicationPriority=high
GPUTuner=enabled
IOGovernor=performance
CPUGovernor=performance
Turbo=enabled

# NOVA AI
[NOVA AI]
OfflineMode=enabled
OllamaURL=http://localhost:11434
OpenAIAPIKey=
VoiceEnabled=true
TTSEngine=espeak
STTEngine=whisper

# NovaShell
[NovaShell]
Launchertool=pulsedock
Animations=enabled
Particles=enabled
GlowEffects=enabled
RGBFramework=PhotonSync
DesktopLayout=expanded

# Network
[Network]
WiFiAutoConnect=true
EthernetAutoConnect=true
HotspotAutoCreate=false

# Display
[Display]
ForceWayland=true
AllowNvidia=false
HDR=auto
RefreshRate=auto

# Boot
[Boot]
Quiet=true
SplashEnabled=true
Logo=nvidia
 PlymouthTheme=novafLogo

# Services
[Services]
Bluetooth=enabled
CUPS=enabled
NetworkManager=enabled
Firewalld=disabled

# User
[User]
DefaultGroups=wheel,audio,video,storage,optical,games
Shell=/bin/bash
AdminGroups=wheel

# System
[System]
Hostname=novaforge
Domain=localdomain
Timezone=UTC
Locale=en_US.UTF-8

# Package manager
[Pacman]
ParallelDownloads=4
Color=always
VerbosePkgLists=1
SigChecks=1
SigCheck=required

# Gaming
[Gaming]
DXVK=enabled
VKD3D=enabled
ACO=enabled
ACOCompiler=LLVM
ACOVersion=latest
Mangohud=enabled
Gamescope=enabled